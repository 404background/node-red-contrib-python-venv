<script type="text/html" data-help-name="venv-config">
  <p>
    このノードではPythonの仮想環境の名前を設定し、作成することができます。
    絶対パスで指定することもできます。
  </p>
  <p>
    このノードを削除すると、仮想環境も削除されます。
    同じ名前の仮想環境を追加しても、作成される仮想環境は一つだけです。
  </p>
  <h3>前提条件</h3>
  <p>
    このノードには <code>python3-venv</code> と <code>pip</code> が
    システムにインストールされている必要があります。
    インストールされていない場合、設定ダイアログに警告が表示されます。
  </p>
  <ul>
    <li>
      <b>Debian/Ubuntu:</b>
      <code>sudo apt install python3-venv python3-pip</code>
    </li>
    <li>
      <b>Windows:</b>
      <a href="https://www.python.org/">python.org</a
      >からPythonをインストールしてください（Microsoft
      Store版にはvenvが含まれない場合があります）。
    </li>
  </ul>
  <h3>Windowsの場合</h3>
  <p>
    Pythonのバージョンを指定することができます。
    予め利用したいバージョンのPythonをインストールしておいてください。
  </p>
</script>
