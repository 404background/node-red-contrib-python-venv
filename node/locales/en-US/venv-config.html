<script type="text/html" data-help-name="venv-config">
  <p>
    This node sets the name of Python virtual environment and creates it. You
    can also set it with an absolute path.
  </p>
  <p>
    When this node is deleted, the virtual environment with that name is also
    deleted. If you add a node with the same venv Name, only one virtual
    environment will be created.
  </p>
  <h3>Prerequisites</h3>
  <p>
    This node requires <code>python3-venv</code> and <code>pip</code> to be
    installed on the system. If they are not available, a warning will be
    displayed in the configuration dialog.
  </p>
  <ul>
    <li><b>Debian/Ubuntu:</b> <code>sudo apt install python3-venv python3-pip</code></li>
    <li><b>Windows:</b> Install Python from <a href="https://www.python.org/">python.org</a> (the Microsoft Store version may not include venv).</li>
  </ul>
  <h3>For Windows</h3>
  <p>
    You can specify the Python version. Please install the Python version you
    want to use in advance.
  </p>
</script>
